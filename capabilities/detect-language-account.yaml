naftiko: 1.0.0-alpha2
info:
  label: Detect Language API — Account
  description: 'Detect Language API — Account. 1 operations. Lead operation: Get account status. Self-contained Naftiko capability
    covering one Detect Language business surface.'
  tags:
  - Detect Language
  - Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DETECT_LANGUAGE_API_KEY: DETECT_LANGUAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: detect-language-account
    baseUri: https://ws.detectlanguage.com/0.2
    description: Detect Language API — Account business capability. Self-contained, no shared references.
    resources:
    - name: user-status
      path: /user/status
      operations:
      - name: getuserstatus
        method: GET
        description: Get account status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.DETECT_LANGUAGE_API_KEY}}'
  exposes:
  - type: rest
    namespace: detect-language-account-rest
    port: 8080
    description: REST adapter for Detect Language API — Account. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user/status
      name: user-status
      description: REST surface for user-status.
      operations:
      - method: GET
        name: getuserstatus
        description: Get account status
        call: detect-language-account.getuserstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: detect-language-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Detect Language API — Account. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-account-status
      description: Get account status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: detect-language-account.getuserstatus
      outputParameters:
      - type: object
        mapping: $.
